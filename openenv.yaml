name: "personal-finance-assistant"
version: "1.0.0"
description: "A real-world OpenEnv environment simulating a Personal Finance Assistant where an AI analyzes user expenses and provides actionable advice."
tasks:
  - id: "1"
    name: "task_1_easy"
    description: "Identify the highest expense category."
    grader: "1"
    grader_name: "grade_task_1"
    grader_path: "environment.graders.grade_task_1"
  - id: "2"
    name: "task_2_medium"
    description: "Detect overspending against a defined budget and suggest a reduction."
    grader: "2"
    grader_name: "grade_task_2"
    grader_path: "environment.graders.grade_task_2"
  - id: "3"
    name: "task_3_hard"
    description: "Provide a full financial advisory summarizing patterns and giving actionable recommendations."
    grader: "3"
    grader_name: "grade_task_3"
    grader_path: "environment.graders.grade_task_3"
python_version: ">=3.9"
app_file: "app.py"
